blueprint:
  name: "Hardtask Rangers: New Training Notifier"
  description: "Sends a beautifully formatted push notification to your phone when a new free slot appears."
  domain: automation
  input:
    hardtask_sensor:
      name: Hardtask Rangers Sensor
      description: Select your custom sensor (now filtered to only show the relevant one).
      selector:
        entity:
          domain: sensor
          integration: hardtask_rangers
    notify_device:
      name: Phone to Notify
      description: Select your mobile phone from the dropdown.
      selector:
        device:
          integration: mobile_app

mode: single

trigger:
  - platform: state
    entity_id: !input hardtask_sensor

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none and 
         trigger.to_state is not none and 
         trigger.from_state.attributes.courses is defined and
         trigger.to_state.attributes.courses is defined }}

action:
  - variables:
      old_ids: >
        {{ trigger.from_state.attributes.courses | map(attribute='id') | list }}
      new_courses: >
        {{ trigger.to_state.attributes.courses | rejectattr('id', 'in', old_ids) | list }}
        
  - condition: template
    value_template: "{{ new_courses | length > 0 }}"
    
  # Using the mobile_app device action instead of a manual service call
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "🎯 New Hardtask Training Available!"
    message: >
      {% for course in new_courses %}
      {{ course.date_time }} | {{ course.name }}
      Instruktor: {{ course.instructor }}
      Místo: {{ course.location }}
      Cena: {{ course.price }}
      Volno: {{ course.free_slots }}
      
      Link: {{ course.url }}
      {% if not loop.last %}
      ---
      {% endif %}
      {% endfor %}
    data:
      clickAction: "{{ new_courses[0].url }}"
